{% extends "base.html" %}

{% block title %}Create New Post - My Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create a New Blog Post</h1>
    <form method="POST" class="blog-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" placeholder="Enter your post title" required>
        </div>

        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea id="content" name="content" rows="10" placeholder="Write your blog post here..." required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish Post</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
