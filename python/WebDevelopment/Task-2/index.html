<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .add-btn {
      background: #28a745;
    }

    .edit-btn {
      background: #ffc107;
      color: black;
    }

    .delete-btn {
      background: #dc3545;
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .task span {
      flex: 1;
    }

    .actions button {
      margin-left: 5px;
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>My To-Do List</h1>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Enter a task...">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <div id="taskList"></div>
  <p id="emptyMsg" class="empty">No tasks yet 🚀</p>
</div>

<script>
  let tasks = [];
  let editIndex = -1;

  function renderTasks() {
    const taskList = document.getElementById("taskList");
    const emptyMsg = document.getElementById("emptyMsg");

    taskList.innerHTML = "";

    if (tasks.length === 0) {
      emptyMsg.style.display = "block";
      return;
    }

    emptyMsg.style.display = "none";

    tasks.forEach((task, index) => {
      const div = document.createElement("div");
      div.className = "task";

      div.innerHTML = `
        <span>${task}</span>
        <div class="actions">
          <button class="edit-btn" onclick="editTask(${index})">Edit</button>
          <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
        </div>
      `;

      taskList.appendChild(div);
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const value = input.value.trim();

    if (value === "") return;

    if (editIndex === -1) {
      tasks.push(value);
    } else {
      tasks[editIndex] = value;
      editIndex = -1;
    }

    input.value = "";
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
  }

  function editTask(index) {
    const input = document.getElementById("taskInput");
    input.value = tasks[index];
    editIndex = index;
  }

  renderTasks();
</script>

</body>
</html>
