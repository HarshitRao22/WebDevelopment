<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern E-Commerce</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
  }

  header {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }

  .container {
    display: flex;
    padding: 20px;
    gap: 20px;
  }

  /* PRODUCTS */
  .products {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .product {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    text-align: center;
  }

  .product:hover {
    transform: translateY(-5px);
  }

  .product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
  }

  .product h3 {
    margin: 10px 0 5px;
  }

  .product p {
    color: #555;
    margin: 5px 0;
  }

  button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4facfe;
    color: white;
    transition: 0.3s;
  }

  button:hover {
    background: #007bff;
  }

  /* CART */
  .cart {
    flex: 1;
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    height: fit-content;
  }

  .cart-item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
    font-size: 14px;
  }

  .remove {
    background: red;
    margin-top: 5px;
  }

  .checkout {
    width: 100%;
    margin-top: 10px;
    background: green;
  }

  .checkout:hover {
    background: darkgreen;
  }

  h2 {
    margin-top: 0;
  }
</style>
</head>

<body>

<header>🛒 My Modern Store</header>

<div class="container">

  <!-- PRODUCTS -->
  <div class="products" id="product-list"></div>

  <!-- CART -->
  <div class="cart">
    <h2>Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total">Total: ₹0</h3>
    <button class="checkout" onclick="checkout()">Checkout</button>
  </div>

</div>

<script>
const products = [
  {
    id: 1,
    name: "Laptop",
    price: 50000,
    img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
  },
  {
    id: 2,
    name: "Smartphone",
    price: 20000,
    img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
  },
  {
    id: 3,
    name: "Headphones",
    price: 2000,
    img: "https://images.unsplash.com/photo-1518443895914-6f94c8b3a2e8"
  },
  {
    id: 4,
    name: "Keyboard",
    price: 1500,
    img: "https://images.unsplash.com/photo-1587829741301-dc798b83add3"
  }
];

let cart = [];

// DISPLAY PRODUCTS
function displayProducts() {
  const list = document.getElementById("product-list");
  list.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    `;

    list.appendChild(div);
  });
}

// ADD TO CART
function addToCart(id) {
  const item = cart.find(i => i.id === id);

  if (item) {
    item.qty++;
  } else {
    const product = products.find(p => p.id === id);
    cart.push({ ...product, qty: 1 });
  }

  displayCart();
}

// REMOVE
function removeFromCart(index) {
  cart.splice(index, 1);
  displayCart();
}

// DISPLAY CART
function displayCart() {
  const cartItems = document.getElementById("cart-items");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <strong>${item.name}</strong><br>
      ₹${item.price} x ${item.qty}
      <br>
      <button class="remove" onclick="removeFromCart(${index})">Remove</button>
    `;

    cartItems.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

// CHECKOUT
function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  alert("🎉 Order placed successfully!");
  cart = [];
  displayCart();
}

displayProducts();
</script>

</body>
</html>
