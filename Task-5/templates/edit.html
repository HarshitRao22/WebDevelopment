{% extends "base.html" %}

{% block title %}Edit Contact - Contact Manager{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Edit Contact</h1>
    
    <form method="POST" class="contact-form">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" value="{{ contact.name }}" placeholder="John Doe" required maxlength="100">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ contact.email }}" placeholder="john@example.com">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ contact.phone }}" placeholder="(123) 456-7890 or +1234567890">
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" value="{{ contact.address }}" placeholder="123 Main St, City, State">
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Add any additional notes...">{{ contact.notes }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✏️ Update Contact</button>
            <a href="{{ url_for('view_contact', contact_id=contact.id) }}" class="btn btn-secondary">❌ Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
